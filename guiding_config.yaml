# Guiding RMS Analysis Configuration
# All hard-coded parameters for get_props_guiding.py

# --- Center initialization for minimization ---
# Initial center guess (pixels) for RMS minimization.
# This is used as the optimizer starting point instead of flux barycentering.
xcen_default: 360
ycen_default: 220

# --- Radial profiling ---
# Primary radial analysis radius in pixels
rad_rms: 50
# Pixels to trim from the maximum possible radius when computing the full radial profile
rad_rms_trim: 5
# Pixel step size for bins at radius <= rad_bin_inner_max
rad_bin_step_inner: 0.5
# Radius (pixels) below which the inner bin step is used
rad_bin_inner_max: 5
# Fractional step factor for bins beyond rad_bin_inner_max (next_bin = r * factor)
rad_bin_step_outer_factor: 0.1

# --- Angular profiling ---
# Size of each angular sector in degrees
angular_bin_size: 30
# Number of cosine harmonics used to fit the azimuthal residual profile
angular_fit_harmonics: 5
# Sampling step in degrees used to locate the maximum of the fitted profile
angular_fit_step_deg: 0.1

# --- Robust statistics ---
# Sigma threshold for robust_mean (reject pixels beyond N * MAD)
robust_mean_sigma: 5
# Threshold for masking bright pixels in remove_hatch (N * nanmedian)
hatch_remove_sigma: 3

# --- WCS ---
# Pixel scale in degrees (absolute value; RA axis is negated for standard orientation)
wcs_cdelt: 0.1
# WCS rotation angle in degrees
wcs_rotation_angle: 45.0

# --- Plotting ---
# Fraction of peak flux used for residual image vmin/vmax
plot_residual_scale: 0.1

# --- Object merge products ---
# List of object names to merge into median registered FOV products.
# Matching is case-insensitive and ignores extra spaces.
merge_objects:
  - Proxima

# --- User-specific folders ---
# Folder settings are selected by current OS username.
# If the username is not present, user.default is used and a warning is printed.
user:
  default:
    # Base directory where input FITS files are searched (used when file patterns are given).
    # An empty string means the current working directory.
    data_folder: '/cosmos99/nirps/raw-data/nirps_he/'
    # Directory where *_guiding_analysis.fits output files are written.
    # An empty string means the output lands next to each input file.
    output_folder: '/data/spirou/guiding_boxes/'
    # wild card
    wildcard: '2024-06-??/NIRPS*.fits' 

  spirou:
    # Base directory where input FITS files are searched (used when file patterns are given).
    # An empty string means the current working directory.
    data_folder: '/cosmos99/nirps/raw-data/nirps_he/'
    # Directory where *_guiding_analysis.fits output files are written.
    # An empty string means the output lands next to each input file.
    output_folder: '/data/spirou/guiding_boxes/'
    # wild card
    wildcard: '2026-??-??/NIRPS*.fits'

  nirps-client:
    # Base directory where input FITS files are searched (used when file patterns are given).
    # An empty string means the current working directory.
    data_folder: '/cosmos99/nirps/raw-data/nirps_he/'
    # Directory where *_guiding_analysis.fits output files are written.
    # An empty string means the output lands next to each input file.
    output_folder: '/data/spirou/guiding_boxes/'
    # wild card
    wildcard: '202?-??-??/NIRPS*.fits'

  eartigau:
    data_folder: '/Users/eartigau/GitHubProjects/nirps_imaging/inputs'
    output_folder: '/Users/eartigau/GitHubProjects/nirps_imaging/outputs'
    wildcard: 'NIRPS*.fits'

  # Exact username entry (takes priority over wildcards):
  # your_username:
  #   data_folder: '/path/to/inputs'
  #   output_folder: '/path/to/outputs'

  # Wildcard patterns are supported (fnmatch syntax, e.g. * matches any string):
  # 'eartig*':
  #   data_folder: '/Users/eartigau/data/nirps'
  #   output_folder: '/Users/eartigau/data/nirps_outputs'
  #
  # Lookup order: exact username > first matching wildcard > default

# --- Throughput merge configuration ---
# This section predicts the extracted e2dsff spectrum associated with each
# guiding-analysis product, optionally computes throughput metrics for any
# missing cache entries, and merges the resulting columns into guiding_log.csv.
throughput:
  enabled: true

  # Filename/path mapping from a guiding-analysis product to the extracted
  # APERO spectrum. Example:
  #   raw      : .../raw-data/nirps_he/2024-03-05/NIRPS_2024-03-06T05_46_04_845.fits
  #   extracted: .../apero-data/nirps_he_online/red/2024-03-05/NIRPS_2024-03-06T05_46_04_845_pp_e2dsff_A.fits
  guiding_suffix: '_guiding_analysis.fits'
  raw_suffix: '.fits'
  extracted_suffix: '_pp_e2dsff_A.fits'
  # Night folder is inferred from the filename timestamp shifted backward by
  # this many hours before formatting YYYY-MM-DD.
  night_folder_offset_hours: 12

  # Throughput algorithm settings copied from nirps_throughput/config.yaml.
  band_min_nm: 1170.0
  band_max_nm: 1330.0
  band_label: 'J'
  blaze_percentile: 50
  jmag_keyword: 'HIERARCH ESO OCS TARG JMAG'
  date_obs_keyword: 'DATE-OBS'
  mjd_obs_keyword: 'MJD-OBS'
  exptime_keyword: 'EXPTIME'
  object_keyword: 'DRSOBJN'
  airmass_keyword: 'HIERARCH ESO TEL AIRM START'
  spec_extension: 'EXT_E2DS_FF'
  blaze_extension: 'FF_BLAZE'
  wave_extension: 'WAVE_NIGHT'

  # These columns are copied from the throughput cache into guiding_log.csv.
  merge_columns:
    - date_obs
    - mjd_obs
    - jmag
    - exptime
    - airmass
    - median_flux_e
    - flux_per_sec
    - throughput_proxy
    - n_orders_used
    - zero_point

  user:
    default:
      extracted_root: '/cosmos99/nirps/apero-data/nirps_he_online/red/'
      wave_file: '/cosmos99/nirps/apero-data/nirps_he_online/calib/NIRPS_2023-06-22T16_26_34_369_pp_e2dsff_A_wave_night_A.fits'
      blaze_file: '/cosmos99/nirps/apero-data/nirps_he_online/calib/FC3F6C4131_pp_blaze_A.fits'
      # Local cache used by this repository for incremental throughput merges.
      results_csv: ''
      # Optional existing throughput cache to bootstrap from.
      bootstrap_results_csv: ''

    nirps-client:
      extracted_root: '/cosmos99/nirps/apero-data/nirps_he_online/red/'
      wave_file: '/cosmos99/nirps/apero-data/nirps_he_online/calib/NIRPS_2023-06-22T16_26_34_369_pp_e2dsff_A_wave_night_A.fits'
      blaze_file: '/cosmos99/nirps/apero-data/nirps_he_online/calib/FC3F6C4131_pp_blaze_A.fits'
      results_csv: '/data/spirou/guiding_boxes/throughput_results.csv'
      bootstrap_results_csv: ''

    eartigau:
      extracted_root: '/cosmos99/nirps/apero-data/nirps_he_online/red/'
      wave_file: '/Users/eartigau/GitHubProjects/nirps_throughput/data/NIRPS_2023-06-22T16_26_34_369_pp_e2dsff_A_wave_night_A.fits'
      blaze_file: '/Users/eartigau/GitHubProjects/nirps_throughput/data/FC3F6C4131_pp_blaze_A.fits'
      results_csv: '/Users/eartigau/GitHubProjects/nirps_imaging/outputs/throughput_results.csv'
      bootstrap_results_csv: '/Users/eartigau/GitHubProjects/nirps_throughput/output/throughput_results.csv'
